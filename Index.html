<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Shellmates Puzzle</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --green:#7ec86e;--gd:#3a6a30;--gb:#c8ffa0;
  --bg:#0d1a0d;--sf:#111f11;--sf2:#162216;
  --gold:#ffd700;
}
html,body{height:100%;overflow-x:hidden;}
body{
  background:var(--bg);
  font-family:'Nunito',sans-serif;
  display:flex;flex-direction:column;align-items:center;
  min-height:100dvh;padding:10px 8px 16px;
  background-image:radial-gradient(ellipse at top,#0a200a 0%,#0d1a0d 60%);
}
.header{text-align:center;margin-bottom:8px;width:100%;}
.logo{font-family:'Fredoka One',cursive;font-size:clamp(20px,6vw,34px);color:var(--green);letter-spacing:2px;text-shadow:0 0 20px rgba(126,200,110,0.4);}
.logo span{color:var(--gb);}
.sub{color:#4a7a40;font-size:clamp(8px,2.5vw,10px);letter-spacing:3px;text-transform:uppercase;margin-top:1px;}
.xlink{display:inline-flex;align-items:center;gap:4px;color:#3a5a30;font-size:10px;text-decoration:none;margin-top:3px;transition:color .2s;}
.xlink:hover{color:var(--green);}
.xlink svg{width:11px;height:11px;fill:currentColor;}

/* TOP ROW: difficulty + image picker + sound */
.top-controls{display:flex;gap:6px;margin-bottom:7px;width:100%;max-width:520px;align-items:center;flex-wrap:wrap;justify-content:center;}
select{
  background:var(--sf);color:var(--green);border:1.5px solid var(--gd);border-radius:50px;
  padding:7px 14px;font-size:12px;cursor:pointer;outline:none;
  font-family:'Nunito',sans-serif;font-weight:700;
}
.icon-btn{
  width:36px;height:36px;border-radius:50%;
  background:var(--sf);border:1.5px solid var(--gd);
  color:var(--green);font-size:15px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .15s;flex-shrink:0;
}
.icon-btn:hover{background:#1a3a1a;border-color:var(--green);}
.icon-btn.muted{color:#2a4a2a;border-color:#1a2a1a;}

/* IMAGE SWITCHER */
.img-tabs{display:flex;gap:5px;margin-bottom:7px;width:100%;max-width:520px;justify-content:center;}
.img-tab{
  flex:1;max-width:140px;padding:5px 8px;border-radius:50px;
  background:var(--sf);border:1.5px solid var(--gd);
  color:#4a7a40;font-size:11px;font-weight:700;cursor:pointer;
  font-family:'Nunito',sans-serif;transition:all .15s;text-align:center;
}
.img-tab.active{background:#1a3a1a;border-color:var(--green);color:var(--gb);}
.img-tab.daily{border-color:#854F0B;color:#EF9F27;background:rgba(186,117,23,0.08);}
.img-tab.daily.active{background:rgba(186,117,23,0.2);border-color:#EF9F27;color:#FAC775;}

/* STATS */
.stats{display:flex;gap:8px;margin-bottom:8px;width:100%;max-width:520px;}
.stat{flex:1;background:var(--sf2);border:1px solid #1e3a1e;border-radius:12px;padding:6px 4px;text-align:center;}
.sv{color:var(--gb);font-size:clamp(16px,4.5vw,22px);font-weight:800;font-family:'Fredoka One',cursive;}
.sl{color:#3a5a30;font-size:8px;letter-spacing:2px;text-transform:uppercase;margin-top:1px;}

/* DAILY BADGE */
.daily-badge{
  display:none;background:rgba(186,117,23,0.15);border:1px solid #854F0B;
  border-radius:20px;padding:3px 12px;color:#EF9F27;font-size:10px;
  font-weight:700;letter-spacing:1px;margin-bottom:6px;text-align:center;
}
.daily-badge.show{display:block;}

/* BOARD */
#wrap{
  position:relative;
  width:min(94vw, 520px, calc(100dvh - 300px));
  flex-shrink:0;
  margin-bottom:8px;
}
#board{
  position:relative;
  width:100%;
  background:#080e08;
  border:2px solid var(--gd);
  border-radius:14px;
  box-shadow:0 0 30px rgba(80,180,60,0.1),0 0 0 1px #0a180a inset;
  overflow:hidden;
  touch-action:none;
  user-select:none;
}

/* TILES rendered on a single canvas */
#gameCanvas{display:block;width:100%;touch-action:none;user-select:none;}

/* Hint overlay canvas */
#hintCv{display:none;position:absolute;top:0;left:0;width:100%;height:100%;border-radius:12px;pointer-events:none;z-index:10;}
#hintCv.show{display:block;}
#hintLbl{display:none;position:absolute;bottom:-26px;left:50%;transform:translateX(-50%);
  background:var(--sf);border:1px solid var(--gd);border-radius:20px;
  color:var(--green);font-size:9px;padding:3px 12px;white-space:nowrap;z-index:20;font-weight:700;letter-spacing:1px;}
#hintLbl.show{display:block;}

/* WIN */
#wover{display:none;position:absolute;inset:0;background:rgba(3,10,3,0.94);border-radius:12px;
  flex-direction:column;align-items:center;justify-content:center;gap:8px;z-index:50;}
#wover.show{display:flex;}
#wover .tr{font-size:44px;}
#wover h2{color:var(--gb);font-size:clamp(15px,5vw,20px);font-family:'Fredoka One',cursive;letter-spacing:2px;}
#wover p{color:var(--green);font-size:12px;text-align:center;padding:0 16px;}
.btn{
  background:var(--sf);color:var(--green);border:1.5px solid var(--gd);border-radius:50px;
  padding:8px 18px;font-size:12px;cursor:pointer;font-weight:700;
  font-family:'Nunito',sans-serif;transition:all .15s;
}
.btn:hover{background:#1a3a1a;border-color:var(--green);}
.btn.pri{border-color:var(--green);color:var(--gb);background:#1a3a1a;}
.btn.gold{border-color:var(--gold);color:var(--gold);background:rgba(255,215,0,0.08);}

/* SOLVE MSG */
#solveMsg{display:none;text-align:center;color:var(--gold);font-size:10px;
  font-weight:800;letter-spacing:1px;margin-bottom:5px;
  padding:4px 14px;background:rgba(255,215,0,0.07);
  border:1px solid rgba(255,215,0,0.18);border-radius:20px;
  width:100%;max-width:520px;}

/* ACTION BUTTONS */
.actions{display:flex;gap:5px;width:100%;max-width:520px;flex-wrap:wrap;justify-content:center;margin-bottom:8px;}
.actions .btn{flex:1;min-width:80px;max-width:130px;padding:8px 10px;text-align:center;}

.footer{color:#2a4a2a;font-size:9px;letter-spacing:2px;text-transform:uppercase;margin-top:6px;}
.footer a{color:#2a4a2a;text-decoration:none;transition:color .2s;}
.footer a:hover{color:var(--green);}
</style>
</head>
<body>

<div class="header">
  <div class="logo">🐢 Shell<span>mates</span></div>
  <div class="sub">Slide to Reveal</div>
  <a class="xlink" href="https://x.com/heyshellmates" target="_blank">
    <svg viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.741l7.73-8.835L1.254 2.25H8.080l4.253 5.622zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
    @heyshellmates
  </a>
</div>

<div class="top-controls">
  <select id="sz" onchange="changeDiff()">
    <option value="3">3×3 — Easy</option>
    <option value="4" selected>4×4 — Normal</option>
    <option value="5">5×5 — Hard</option>
  </select>
  <button class="icon-btn" id="soundBtn" onclick="toggleSound()" title="Toggle sound">🔊</button>
  <button class="icon-btn" onclick="init()" title="Shuffle">🔀</button>
</div>

<div class="img-tabs">
  <button class="img-tab active" onclick="setTurtle(0,this)">🐢 Shell One</button>
  <button class="img-tab" onclick="setTurtle(1,this)">🐢 Shell Two</button>
  <button class="img-tab daily" onclick="setDaily(this)">📅 Daily</button>
</div>

<div class="daily-badge" id="dailyBadge">📅 Daily Puzzle — everyone gets the same!</div>

<div class="stats">
  <div class="stat"><div class="sv" id="mv">0</div><div class="sl">Moves</div></div>
  <div class="stat"><div class="sv" id="tm">0:00</div><div class="sl">Time</div></div>
  <div class="stat"><div class="sv" id="bv">—</div><div class="sl">Best</div></div>
  <div class="stat"><div class="sv" id="streak">0</div><div class="sl">Streak</div></div>
</div>

<div id="wrap">
  <div id="board">
    <canvas id="gameCanvas"></canvas>
    <canvas id="hintCv"></canvas>
    <div id="hintLbl">👁 Original Image</div>
    <div id="wover">
      <div class="tr">🏆</div>
      <h2>Puzzle Solved!</h2>
      <p id="wmsg"></p>
      <button class="btn pri" onclick="init()">Play Again 🔀</button>
    </div>
  </div>
</div>

<div id="solveMsg"></div>

<div class="actions">
  <button class="btn" id="hintBtn"
    onmousedown="startHint()" onmouseup="stopHint()"
    ontouchstart="startHint();event.preventDefault()" ontouchend="stopHint()">👁 Hint</button>
  <button class="btn gold" id="solveBtn" onclick="toggleGuide()">💡 Guide Me</button>
  <button class="btn" onclick="stopGuide()">↩ Free Play</button>
</div>

<div class="footer"><a href="https://x.com/heyshellmates" target="_blank">@heyshellmates</a></div>

// ── STATE ────────────────────────────────────────────────────────
let N=4, tiles=[], empty=0, moves=0, t0=null, tid=null, active=false;
let best={3:null,4:null,5:null}, streak=0;
let solverSteps=[], solverIdx=0, guiding=false;
let soundOn=true, isDaily=false, currentImgIdx=0;
let animating=false;

// Canvas setup
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
let TS=0, BOARD_PAD=6;

// Images
const imgObjs = IMGS.map(src => {
  const i = new Image(); i.src = src; return i;
});
let img = imgObjs[0];

// ── AUDIO ────────────────────────────────────────────────────────
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let actx = null;
function getACtx(){ if(!actx) actx = new AudioCtx(); return actx; }

function playTone(freq, dur, type='sine', vol=0.18){
  if(!soundOn) return;
  try{
    const ac = getACtx();
    const o = ac.createOscillator();
    const g = ac.createGain();
    o.connect(g); g.connect(ac.destination);
    o.type = type; o.frequency.value = freq;
    g.gain.setValueAtTime(vol, ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur);
    o.start(); o.stop(ac.currentTime + dur);
  } catch(e){}
}

function playSlide(){ playTone(220, 0.08, 'square', 0.12); }
function playWin(){
  if(!soundOn) return;
  [523,659,784,1047].forEach((f,i) => setTimeout(()=>playTone(f,0.25,'sine',0.2), i*100));
}
function playClick(){ playTone(330, 0.06, 'sine', 0.1); }

function toggleSound(){
  soundOn = !soundOn;
  const btn = document.getElementById('soundBtn');
  btn.textContent = soundOn ? '🔊' : '🔇';
  btn.classList.toggle('muted', !soundOn);
  playClick();
}

// ── SIZING ───────────────────────────────────────────────────────
function calcSize(){
  const wrap = document.getElementById('wrap');
  const w = wrap.clientWidth;
  // tile size = (board width - padding*2 - gaps) / N
  TS = Math.floor((w - BOARD_PAD*2 - (N-1)*4) / N);
  const bsz = BOARD_PAD*2 + N*TS + (N-1)*4;
  canvas.width = bsz;
  canvas.height = bsz;
  canvas.style.width = bsz + 'px';
  canvas.style.height = bsz + 'px';
  document.getElementById('board').style.width = bsz + 'px';
  document.getElementById('board').style.height = bsz + 'px';
}

window.addEventListener('resize', ()=>{ calcSize(); drawAll(); });

// ── COORDS ──────────────────────────────────────────────────────
function tileX(pos){ return BOARD_PAD + (pos%N)*(TS+4); }
function tileY(pos){ return BOARD_PAD + Math.floor(pos/N)*(TS+4); }

// ── DRAW ─────────────────────────────────────────────────────────
function drawPiece(dctx, val, dx, dy, dw, dh, highlight){
  if(!img.complete || img.naturalWidth===0) return;
  const iw=img.naturalWidth, ih=img.naturalHeight;
  const sq=Math.min(iw,ih);
  const ox=(iw-sq)/2, oy=(ih-sq)/2;
  const sw=sq/N;
  const sx=ox+(val%N)*sw, sy=oy+Math.floor(val/N)*sw;

  // rounded clip
  dctx.save();
  dctx.beginPath();
  roundRect(dctx, dx, dy, dw, dh, 7);
  dctx.clip();
  dctx.drawImage(img, sx, sy, sw, sw, dx, dy, dw, dh);

  if(highlight){
    dctx.fillStyle = 'rgba(255,215,0,0.22)';
    dctx.fillRect(dx, dy, dw, dh);
  }
  dctx.restore();

  // border
  dctx.strokeStyle = highlight ? '#ffd700' : '#3a6a30';
  dctx.lineWidth = highlight ? 2.5 : 1.5;
  dctx.beginPath();
  roundRect(dctx, dx+0.75, dy+0.75, dw-1.5, dh-1.5, 6.5);
  dctx.stroke();

  // arrow on highlight
  if(highlight){
    const er=Math.floor(empty/N), ec=empty%N;
    const pr=Math.floor(tiles.indexOf(val)/N), pc=tiles.indexOf(val)%N;
    // find which pos has this val
    let pos=-1;
    for(let i=0;i<tiles.length;i++) if(tiles[i]===val){pos=i;break;}
    const r=Math.floor(pos/N), c=pos%N;
    const er2=Math.floor(empty/N), ec2=empty%N;
    let arrow = r>er2?'▲':r<er2?'▼':c>ec2?'◀':'▶';
    dctx.fillStyle = 'rgba(255,215,0,0.95)';
    dctx.font = `bold ${Math.round(dw*0.38)}px sans-serif`;
    dctx.textAlign='center'; dctx.textBaseline='middle';
    dctx.shadowColor='rgba(0,0,0,0.8)'; dctx.shadowBlur=5;
    dctx.fillText(arrow, dx+dw/2, dy+dh/2);
    dctx.shadowBlur=0;
  }
}

function roundRect(c,x,y,w,h,r){
  c.beginPath();
  c.moveTo(x+r,y); c.lineTo(x+w-r,y); c.arcTo(x+w,y,x+w,y+r,r);
  c.lineTo(x+w,y+h-r); c.arcTo(x+w,y+h,x+w-r,y+h,r);
  c.lineTo(x+r,y+h); c.arcTo(x,y+h,x,y+h-r,r);
  c.lineTo(x,y+r); c.arcTo(x,y,x+r,y,r);
  c.closePath();
}

function drawEmpty(x,y,w,h){
  ctx.save();
  ctx.beginPath(); roundRect(ctx,x,y,w,h,7); ctx.clip();
  ctx.fillStyle='#0a120a'; ctx.fillRect(x,y,w,h);
  ctx.restore();
  ctx.strokeStyle='#1a3a1a'; ctx.lineWidth=1.5; ctx.setLineDash([4,4]);
  ctx.beginPath(); roundRect(ctx,x+0.75,y+0.75,w-1.5,h-1.5,6.5); ctx.stroke();
  ctx.setLineDash([]);
}

let highlightPos = -1;
function drawAll(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  for(let pos=0;pos<N*N;pos++){
    const x=tileX(pos), y=tileY(pos);
    if(pos===empty){ drawEmpty(x,y,TS,TS); continue; }
    const val=tiles[pos];
    const isHint = (highlightPos>=0 && pos===highlightPos);
    drawPiece(ctx, val, x, y, TS, TS, isHint);
  }
}

// Smooth slide animation
let animPos=-1, animFromX=0, animFromY=0, animToX=0, animToY=0, animVal=0;
let animStart=0, ANIM_DUR=140;

function animateTile(fromPos, toPos, callback){
  animating=true;
  animPos=toPos; // destination (empty slot)
  animVal=tiles[fromPos];
  animFromX=tileX(fromPos); animFromY=tileY(fromPos);
  animToX=tileX(toPos); animToY=tileY(toPos);
  animStart=performance.now();
  requestAnimationFrame(function frame(now){
    const t=Math.min((now-animStart)/ANIM_DUR,1);
    const ease=t<0.5?2*t*t:-1+(4-2*t)*t; // ease in-out
    ctx.clearRect(0,0,canvas.width,canvas.height);
    for(let pos=0;pos<N*N;pos++){
      if(pos===fromPos) continue; // skip moving tile
      const x=tileX(pos),y=tileY(pos);
      if(pos===empty){ drawEmpty(x,y,TS,TS); continue; }
      drawPiece(ctx,tiles[pos],x,y,TS,TS,false);
    }
    // draw moving tile
    const cx=animFromX+(animToX-animFromX)*ease;
    const cy=animFromY+(animToY-animFromY)*ease;
    drawPiece(ctx,animVal,cx,cy,TS,TS,false);
    if(t<1){ requestAnimationFrame(frame); }
    else{
      // commit move
      [tiles[empty],tiles[fromPos]]=[tiles[fromPos],tiles[empty]];
      empty=fromPos;
      animating=false;
      highlightPos=-1;
      drawAll();
      callback && callback();
    }
  });
}

// ── GAME LOGIC ───────────────────────────────────────────────────
function nbrs(idx){
  const r=Math.floor(idx/N),c=idx%N,ns=[];
  if(r>0)ns.push(idx-N); if(r<N-1)ns.push(idx+N);
  if(c>0)ns.push(idx-1); if(c<N-1)ns.push(idx+1);
  return ns;
}

function won(){ return tiles.every((v,i)=>v===i); }

function handleTileClick(pos){
  if(animating) return;
  if(!nbrs(empty).includes(pos)) return;

  if(!active){ active=true; t0=Date.now(); clearInterval(tid); tid=setInterval(tick,500); }

  if(guiding && solverSteps.length>0){
    if(pos===solverSteps[solverIdx]){
      moves++;
      document.getElementById('mv').textContent=moves;
      playSlide();
      animateTile(pos, empty, ()=>{
        solverIdx++;
        if(solverIdx>=solverSteps.length||won()){
          stopGuide(); drawAll();
          if(won()) onWin();
        } else {
          highlightPos = solverSteps[solverIdx];
          drawAll();
          updateSolveMsg();
        }
      });
    } else {
      // wrong tile - flash correct one
      highlightPos = solverSteps[solverIdx];
      drawAll();
    }
    return;
  }

  moves++;
  document.getElementById('mv').textContent=moves;
  playSlide();
  animateTile(pos, empty, ()=>{
    if(won()) onWin();
  });
}

// ── TOUCH / CLICK on canvas ──────────────────────────────────────
canvas.addEventListener('pointerdown', onPointerDown, {passive:false});

function onPointerDown(e){
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width/rect.width;
  const scaleY = canvas.height/rect.height;
  const cx = (e.clientX - rect.left)*scaleX;
  const cy = (e.clientY - rect.top)*scaleY;
  // find which tile was tapped
  for(let pos=0;pos<N*N;pos++){
    if(pos===empty) continue;
    const x=tileX(pos),y=tileY(pos);
    if(cx>=x && cx<=x+TS && cy>=y && cy<=y+TS){
      handleTileClick(pos);
      return;
    }
  }
}

// ── WIN ──────────────────────────────────────────────────────────
function onWin(){
  clearInterval(tid); active=false;
  const sec=t0?Math.floor((Date.now()-t0)/1000):0;
  const m=Math.floor(sec/60),s=sec%60;
  if(!best[N]||moves<best[N])best[N]=moves;
  if(isDaily){ streak++; document.getElementById('streak').textContent=streak; }
  document.getElementById('bv').textContent=best[N]||'—';
  document.getElementById('wmsg').textContent=
    moves+' moves · '+m+':'+String(s).padStart(2,'0')+(isDaily?' 🌟 Daily Complete!':'');
  document.getElementById('wover').classList.add('show');
  playWin();
}

function tick(){
  if(!t0)return;
  const sec=Math.floor((Date.now()-t0)/1000);
  document.getElementById('tm').textContent=Math.floor(sec/60)+':'+String(sec%60).padStart(2,'0');
}

// ── INIT ─────────────────────────────────────────────────────────
function changeDiff(){
  N=parseInt(document.getElementById('sz').value);
  calcSize(); init();
}

function init(){
  moves=0; document.getElementById('mv').textContent='0';
  clearInterval(tid); t0=null; active=false; animating=false;
  document.getElementById('tm').textContent='0:00';
  document.getElementById('wover').classList.remove('show');
  stopGuide();
  tiles=Array.from({length:N*N},(_,i)=>i);
  empty=N*N-1;
  if(isDaily) seedShuffle(); else shuffle();
  highlightPos=-1;
  drawAll();
}

function shuffle(){
  for(let i=0;i<3000;i++){
    const nb=nbrs(empty),p=nb[Math.floor(Math.random()*nb.length)];
    [tiles[empty],tiles[p]]=[tiles[p],tiles[empty]]; empty=p;
  }
}

function seedShuffle(){
  // deterministic seed from today's date
  const d=new Date();
  const seed=d.getFullYear()*10000+(d.getMonth()+1)*100+d.getDate();
  let s=seed;
  function rand(){s=((s*1664525+1013904223)&0xffffffff)>>>0;return s/4294967296;}
  for(let i=0;i<3000;i++){
    const nb=nbrs(empty),p=nb[Math.floor(rand()*nb.length)];
    [tiles[empty],tiles[p]]=[tiles[p],tiles[empty]]; empty=p;
  }
}

// ── IMAGE SELECTION ──────────────────────────────────────────────
function setTurtle(idx, btn){
  isDaily=false;
  document.getElementById('dailyBadge').classList.remove('show');
  currentImgIdx=idx;
  img=imgObjs[idx];
  document.querySelectorAll('.img-tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  if(img.complete) init(); else img.onload=()=>init();
}

function setDaily(btn){
  isDaily=true;
  document.getElementById('dailyBadge').classList.add('show');
  // Daily uses turtle based on day of month (alternates between 2)
  const dayOfMonth=new Date().getDate();
  currentImgIdx=dayOfMonth%2;
  img=imgObjs[currentImgIdx];
  document.querySelectorAll('.img-tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  if(img.complete) init(); else img.onload=()=>init();
}

// ── HINT OVERLAY ─────────────────────────────────────────────────
function startHint(){
  const board=document.getElementById('board');
  const hc=document.getElementById('hintCv');
  const bsz=canvas.width;
  hc.width=bsz; hc.height=bsz;
  hc.style.width=bsz+'px'; hc.style.height=bsz+'px';
  const hx=hc.getContext('2d');
  const iw=img.naturalWidth,ih=img.naturalHeight,sq=Math.min(iw,ih);
  hx.drawImage(img,(iw-sq)/2,(ih-sq)/2,sq,sq,0,0,bsz,bsz);
  hx.strokeStyle='rgba(80,200,80,0.5)'; hx.lineWidth=1.5;
  for(let i=1;i<N;i++){
    const gp=BOARD_PAD+i*(TS+4)-2;
    hx.beginPath();hx.moveTo(gp,0);hx.lineTo(gp,bsz);hx.stroke();
    hx.beginPath();hx.moveTo(0,gp);hx.lineTo(bsz,gp);hx.stroke();
  }
  hx.font=`bold ${Math.round(TS*0.26)}px monospace`;
  hx.textAlign='center'; hx.textBaseline='middle';
  for(let i=0;i<N*N-1;i++){
    const cx=tileX(i)+TS/2, cy=tileY(i)+TS/2;
    hx.fillStyle='rgba(0,0,0,0.6)'; hx.fillRect(cx-20,cy-17,40,32);
    hx.fillStyle='#c8ffa0'; hx.fillText(i+1,cx,cy);
  }
  board.style.opacity='0.07';
  hc.classList.add('show');
  document.getElementById('hintLbl').classList.add('show');
}

function stopHint(){
  document.getElementById('board').style.opacity='1';
  document.getElementById('hintCv').classList.remove('show');
  document.getElementById('hintLbl').classList.remove('show');
}

// ── GUIDE / SOLVER ───────────────────────────────────────────────
function toggleGuide(){
  if(guiding){ stopGuide(); return; }
  if(won()) return;
  if(N===3){
    const sol=bfsSolve(tiles.slice(),empty,N);
    if(!sol){alert('Could not solve — try shuffling!');return;}
    solverSteps=sol; solverIdx=0; guiding=true;
    document.getElementById('solveBtn').textContent='⏹ Stop Guide';
    highlightPos=solverSteps[0];
    drawAll(); updateSolveMsg();
  } else {
    guiding=true;
    document.getElementById('solveBtn').textContent='⏹ Stop Guide';
    greedyHint();
  }
}

function updateSolveMsg(){
  const m=document.getElementById('solveMsg');
  m.textContent=`Step ${solverIdx+1} of ${solverSteps.length} — slide the glowing tile`;
  m.style.display='block';
}

function greedyHint(){
  let best=-1,bestG=-Infinity;
  for(const nb of nbrs(empty)){
    const val=tiles[nb],tgt=val;
    const cur=Math.abs(Math.floor(nb/N)-Math.floor(tgt/N))+Math.abs(nb%N-tgt%N);
    const nxt=Math.abs(Math.floor(empty/N)-Math.floor(tgt/N))+Math.abs(empty%N-tgt%N);
    if(cur-nxt>bestG){bestG=cur-nxt;best=nb;}
  }
  if(best===-1) best=nbrs(empty)[0];
  highlightPos=best;
  drawAll();
  const m=document.getElementById('solveMsg');
  m.textContent='Slide the glowing tile (greedy hint)';
  m.style.display='block';
}

function stopGuide(){
  guiding=false; solverSteps=[]; solverIdx=0; highlightPos=-1;
  document.getElementById('solveMsg').style.display='none';
  document.getElementById('solveBtn').textContent='💡 Guide Me';
  drawAll();
}

function bfsSolve(st,se,n){
  const goal=Array.from({length:n*n},(_,i)=>i).join(',');
  if(st.join(',')===goal)return[];
  const queue=[{t:st,e:se,p:[]}];
  const vis=new Set([st.join(',')+','+se]);
  let lim=250000;
  while(queue.length&&lim-->0){
    const {t,e,p}=queue.shift();
    for(const nb of nbrs2(e,n)){
      const nt=t.slice();[nt[e],nt[nb]]=[nt[nb],nt[e]];
      const k=nt.join(',')+','+nb;
      if(vis.has(k))continue;
      vis.add(k);
      const np=[...p,nb];
      if(nt.join(',')===goal)return np;
      queue.push({t:nt,e:nb,p:np});
    }
  }
  return null;
}

function nbrs2(idx,n){
  const r=Math.floor(idx/n),c=idx%n,ns=[];
  if(r>0)ns.push(idx-n);if(r<n-1)ns.push(idx+n);
  if(c>0)ns.push(idx-1);if(c<n-1)ns.push(idx+1);
  return ns;
}

// ── START ────────────────────────────────────────────────────────
function start(){
  N=parseInt(document.getElementById('sz').value);
  calcSize();
  img=imgObjs[0];
  if(imgObjs.every(i=>i.complete)){ init(); }
  else {
    let loaded=0;
    imgObjs.forEach(i=>{ i.onload=()=>{ if(++loaded===imgObjs.length) init(); }; });
  }
}

// Wait for layout then start
if(document.readyState==='complete') start();
else window.addEventListener('load', start);
</script>
